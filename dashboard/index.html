<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1b26">
  <title>Greenkeeper Glass</title>
  <style>
    :root {
      --bg: #1a1b26;
      --fg: #c0caf5;
      --accent: #7aa2f7;
      --error: #f7768e;
      --success: #9ece6a;
      --panel: #24283b;
      --border: #414868;
    }
    body {
      margin: 0;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .setup-panel, .dashboard-panel {
      background: var(--panel);
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #9aa5ce;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      background: #16161e;
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 4px;
      box-sizing: border-box;
      font-family: monospace;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      opacity: 0.9;
    }
    .message {
      background: #16161e;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border-left: 4px solid var(--accent);
      word-wrap: break-word;
    }
    .message .timestamp {
      font-size: 0.8rem;
      color: #9aa5ce;
      margin-bottom: 0.5rem;
    }
    .message .decrypted {
      font-family: monospace;
      white-space: pre-wrap;
    }
    .error-log {
      color: var(--error);
      background: rgba(247, 118, 142, 0.1);
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      display: none;
      word-wrap: break-word;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      color: #9aa5ce;
    }
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-connected { background: var(--success); }
    .status-error { background: var(--error); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Greenkeeper Dashboard</h1>
    
    <div id="errorLog" class="error-log"></div>

    <div id="setupPanel" class="setup-panel">
      <div class="form-group">
        <label for="relayUrl">Cloudflare Relay URL (with ?key=...)</label>
        <input type="text" id="relayUrl" placeholder="https://...workers.dev?key=..." />
      </div>
      <div class="form-group">
        <label for="encryptionKey">AES-256-GCM Key</label>
        <input type="password" id="encryptionKey" placeholder="32-character base64 key" />
      </div>
      <button id="connectBtn">Decrypt & Read</button>
    </div>

    <div id="dashboardPanel" class="dashboard-panel" style="display: none;">
      <div class="status-bar">
        <div><span class="status-indicator status-connected"></span>Status: <span id="statusText">Connected</span></div>
      </div>
      <div id="messages"></div>
      <button id="refreshBtn" style="margin-top: 1rem; background: var(--panel); border: 1px solid var(--border); color: var(--fg);">Disconnect & Clear</button>
    </div>
  </div>

  <script>
    const TIMEOUT_MS = 10000; // 10 seconds

    function showError(msg) {
      const el = document.getElementById('errorLog');
      el.textContent = 'Error: ' + msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorLog').style.display = 'none';
    }

    async function decryptPayload(payload, keyBase64) {
      try {
        const keyBuffer = Uint8Array.from(atob(keyBase64), c => c.charCodeAt(0));
        const cryptoKey = await window.crypto.subtle.importKey(
          'raw',
          keyBuffer,
          { name: 'AES-GCM' },
          false,
          ['decrypt']
        );

        const ivBuffer = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
        const ciphertextBuffer = Uint8Array.from(atob(payload.ciphertext), c => c.charCodeAt(0));
        const authTagBuffer = Uint8Array.from(atob(payload.authTag), c => c.charCodeAt(0));

        const combinedBuffer = new Uint8Array(ciphertextBuffer.length + authTagBuffer.length);
        combinedBuffer.set(ciphertextBuffer);
        combinedBuffer.set(authTagBuffer, ciphertextBuffer.length);

        const decryptedBuffer = await window.crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: ivBuffer },
          cryptoKey,
          combinedBuffer
        );

        const decoder = new TextDecoder();
        return JSON.parse(decoder.decode(decryptedBuffer));
      } catch (e) {
        throw new Error('Decryption failed. Check key or payload format.');
      }
    }

    function showSetup() {
      document.getElementById('setupPanel').style.display = 'block';
      document.getElementById('dashboardPanel').style.display = 'none';
      sessionStorage.removeItem('relayUrl');
      sessionStorage.removeItem('encryptionKey');
    }

    function showDashboard() {
      hideError();
      const url = document.getElementById('relayUrl').value.trim();
      const key = document.getElementById('encryptionKey').value.trim();
      
      if (!url || !key) {
        showError('Please provide both URL and Key');
        return;
      }

      sessionStorage.setItem('relayUrl', url);
      sessionStorage.setItem('encryptionKey', key);
      
      document.getElementById('setupPanel').style.display = 'none';
      document.getElementById('dashboardPanel').style.display = 'block';
      
      fetchMessages();
    }

    async function fetchMessages() {
      const relayUrl = sessionStorage.getItem('relayUrl');
      const key = sessionStorage.getItem('encryptionKey');
      
      if (!relayUrl || !key) {
        showSetup();
        return;
      }

      const messagesEl = document.getElementById('messages');
      messagesEl.textContent = '';
      const loadingEl = document.createElement('div');
      loadingEl.style.color = '#666';
      loadingEl.textContent = 'Loading and decrypting...';
      messagesEl.appendChild(loadingEl);

      try {
        const response = await fetch(relayUrl, { 
          signal: AbortSignal.timeout(TIMEOUT_MS) 
        });
        
        if (!response.ok) { 
          if (response.status === 404) {
             throw new Error('Payload not found. It may have already been read and deleted.');
          }
          throw new Error(`Failed to fetch: ${response.statusText}`); 
        }
        
        const encryptedBlob = await response.json();
        
        messagesEl.textContent = ''; // clear loading

        try {
          const decrypted = await decryptPayload(encryptedBlob, key);
          
          const msgEl = document.createElement('div');
          msgEl.className = 'message';
          
          const tsEl = document.createElement('div');
          tsEl.className = 'timestamp';
          tsEl.textContent = 'Payload timestamp: ' + new Date(encryptedBlob.timestamp).toLocaleString();
          msgEl.appendChild(tsEl);
          
          const decEl = document.createElement('div');
          decEl.className = 'decrypted';
          
          // Format the decrypted payload nicely
          let content = JSON.stringify(decrypted, null, 2);
          if (content.length > 2000) {
            content = content.slice(0, 2000) + '...';
          }
          decEl.textContent = content;
          
          msgEl.appendChild(decEl);
          messagesEl.appendChild(msgEl);

        } catch (e) {
          console.error('Decryption failed:', e);
          const errorEl = document.createElement('div');
          errorEl.style.color = 'var(--error)';
          errorEl.textContent = 'Decryption failed. Invalid key or payload.';
          messagesEl.appendChild(errorEl);
        }

      } catch (err) {
        showError(err.message);
        messagesEl.textContent = '';
      }
    }

    document.getElementById('connectBtn').addEventListener('click', showDashboard);
    document.getElementById('refreshBtn').addEventListener('click', showSetup);

    if (sessionStorage.getItem('encryptionKey') && sessionStorage.getItem('relayUrl')) {
      document.getElementById('relayUrl').value = sessionStorage.getItem('relayUrl');
      document.getElementById('encryptionKey').value = sessionStorage.getItem('encryptionKey');
      showDashboard();
    }
  </script>
</body>
</html>
