<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greenkeeper Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #00ff88; margin-bottom: 20px; }
    .status { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .status-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
    .status-item:last-child { border-bottom: none; }
    .label { color: #888; }
    .value { color: #00ff88; }
    .value.error { color: #ff4444; }
    input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 16px; margin-bottom: 15px; }
    input:focus { outline: none; border-color: #00ff88; }
    button { width: 100%; padding: 12px; background: #00ff88; color: #000; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:hover { background: #00cc6a; }
    .messages { background: #1a1a1a; border-radius: 8px; padding: 15px; margin-top: 20px; }
    .message { background: #252525; padding: 12px; border-radius: 6px; margin-bottom: 10px; }
    .message:last-child { margin-bottom: 0; }
    .timestamp { color: #666; font-size: 12px; }
    .decrypted { color: #e0e0e0; margin-top: 5px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Greenkeeper Dashboard</h1>
    
    <div id="setup" class="status">
      <div class="status-item">
        <span class="label">Encryption Key</span>
      </div>
      <input type="password" id="encryptionKey" placeholder="Enter 32-byte encryption key" maxlength="32">
      <div class="status-item">
        <span class="label">Cloudflare Worker URL</span>
      </div>
      <input type="text" id="relayUrl" placeholder="https://your-worker.workers.dev" value="">
      <button id="connectBtn">Connect</button>
    </div>

    <div id="dashboard" class="hidden">
      <div class="status">
        <div class="status-item">
          <span class="label">Status</span>
          <span class="value" id="status">Connected</span>
        </div>
        <div class="status-item">
          <span class="label">Messages Received</span>
          <span class="value" id="messageCount">0</span>
        </div>
      </div>
      
      <button id="refreshBtn">Refresh Messages</button>
      
      <div class="messages" id="messages">
        <div style="color: #666;">No messages yet</div>
      </div>
    </div>
  </div>

  <script>
    const TIMEOUT_MS = 10000;
    let messageKeys = [];

    async function decryptPayload(payload, key) {
      const keyBuffer = new TextEncoder().encode(key.padEnd(32, '0').slice(0, 32));
      const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
      const authTag = Uint8Array.from(atob(payload.authTag), c => c.charCodeAt(0));
      const ciphertext = Uint8Array.from(atob(payload.ciphertext), c => c.charCodeAt(0));

      const cryptoKey = await crypto.subtle.importKey(
        'raw', keyBuffer, { name: 'AES-GCM' }, false, ['decrypt']
      );

      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv, tagLength: 128 },
        cryptoKey,
        ciphertext
      );

      const decoder = new TextDecoder();
      const decoded = decoder.decode(decrypted);
      return JSON.parse(decoded);
    }

    async function fetchMessages() {
      const relayUrl = sessionStorage.getItem('relayUrl');
      const key = sessionStorage.getItem('encryptionKey');
      
      if (!relayUrl || !key) {
        showSetup();
        return;
      }

      const messagesEl = document.getElementById('messages');
      messagesEl.textContent = '';
      const loadingEl = document.createElement('div');
      loadingEl.style.color = '#666';
      loadingEl.textContent = 'Loading...';
      messagesEl.appendChild(loadingEl);

      try {
        const response = await fetch(relayUrl + '/keys', { 
          signal: AbortSignal.timeout(TIMEOUT_MS) 
        });
        
        if (!response.ok) throw new Error('Failed to fetch keys');
        
        const keys = await response.json();
        messageKeys = keys.keys || [];
        
        document.getElementById('messageCount').textContent = messageKeys.length;
        
        if (messageKeys.length === 0) {
        const noMsgEl = document.createElement('div');
        noMsgEl.style.color = '#666';
        noMsgEl.textContent = 'No messages yet';
        messagesEl.appendChild(noMsgEl);
        return;
        }

        messagesEl.innerHTML = '';
        
        if (messageKeys.length === 0) {
          const emptyEl = document.createElement('div');
          emptyEl.style.color = '#666';
          emptyEl.textContent = 'No messages yet';
          messagesEl.appendChild(emptyEl);
          return;
        }

        for (const keyId of messageKeys.slice(0, 20)) {
          try {
            const resp = await fetch(relayUrl + '?key=' + keyId, {
              signal: AbortSignal.timeout(TIMEOUT_MS)
            });
            const payload = await resp.json();
            
            const decrypted = await decryptPayload(payload, key);
            
            const msgEl = document.createElement('div');
            msgEl.className = 'message';
            
            const tsEl = document.createElement('div');
            tsEl.className = 'timestamp';
            tsEl.textContent = new Date(payload.timestamp).toLocaleString();
            msgEl.appendChild(tsEl);
            
            const decEl = document.createElement('div');
            decEl.className = 'decrypted';
            let content = decrypted.content || JSON.stringify(decrypted);
            if (content.length > 2000) {
              content = content.slice(0, 2000) + '...';
            }
            decEl.textContent = content;
            msgEl.appendChild(decEl);
            
            messagesEl.appendChild(msgEl);
          } catch (e) {
            console.error('Failed to decrypt message:', e);
          }
        }
        
        if (messagesEl.children.length === 0) {
          const noMsgEl = document.createElement('div');
          noMsgEl.style.color = '#666';
          noMsgEl.textContent = 'No messages';
          messagesEl.appendChild(noMsgEl);
        }
      } catch (error) {
        messagesEl.textContent = '';
        const errorEl = document.createElement('div');
        errorEl.style.color = '#ff4444';
        errorEl.textContent = 'Error: ' + error.message;
        messagesEl.appendChild(errorEl);
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showSetup() {
      document.getElementById('setup').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('hidden');
    }

    function validateKey(key) {
      if (!key) return { valid: false, error: 'Key is required' };
      
      let normalizedKey = key;
      if (/^[0-9a-fA-F]{64}$/.test(key)) {
        normalizedKey = hexToBytes(key);
        if (normalizedKey.length !== 32) {
          return { valid: false, error: 'Invalid hex key: must decode to 32 bytes' };
        }
      } else if (key.length < 32) {
        return { valid: false, error: 'Key must be at least 32 bytes' };
      } else if (key.length > 32) {
        normalizedKey = key.slice(0, 32);
      }
      
      const uniqueChars = new Set(key.split('')).size;
      const isWeak = uniqueChars <= 5;
      
      return { valid: true, key: normalizedKey, isWeak };
    }

    function hexToBytes(hex) {
      const bytes = [];
      for (let i = 0; i < hex.length; i += 2) {
        bytes.push(parseInt(hex.substr(i, 2), 16));
      }
      return String.fromCharCode.apply(null, bytes);
    }

    function showDashboard() {
      const keyInput = document.getElementById('encryptionKey').value;
      const relayUrl = document.getElementById('relayUrl').value;
      
      if (!relayUrl) {
        alert('Please enter the Cloudflare Worker URL');
        return;
      }

      const keyValidation = validateKey(keyInput);
      if (!keyValidation.valid) {
        alert(keyValidation.error);
        return;
      }
      
      if (keyValidation.isWeak) {
        alert('Warning: Your key has low entropy (repetitive characters). Consider using a stronger key.');
      }

      sessionStorage.setItem('encryptionKey', keyValidation.key);
      sessionStorage.setItem('relayUrl', relayUrl);
      
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      
      fetchMessages();
    }

    document.getElementById('connectBtn').addEventListener('click', showDashboard);
    document.getElementById('refreshBtn').addEventListener('click', fetchMessages);

    if (sessionStorage.getItem('encryptionKey')) {
      showDashboard();
    }
  </script>
</body>
</html>
