<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1b26">
  <title>Greenkeeper Glass</title>
  <style>
    :root {
      --bg: #1a1b26;
      --fg: #c0caf5;
      --accent: #7aa2f7;
      --error: #f7768e;
      --success: #9ece6a;
      --panel: #24283b;
      --border: #414868;
    }
    body {
      margin: 0;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .setup-panel, .dashboard-panel {
      background: var(--panel);
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #9aa5ce;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      background: #16161e;
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 4px;
      box-sizing: border-box;
      font-family: monospace;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      opacity: 0.9;
    }
    .message {
      background: #16161e;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border-left: 4px solid var(--accent);
      word-wrap: break-word;
    }
    .message .timestamp {
      font-size: 0.8rem;
      color: #9aa5ce;
      margin-bottom: 0.5rem;
    }
    .message .decrypted {
      font-family: monospace;
      white-space: pre-wrap;
    }
    .distillation-summary {
      background: rgba(122, 162, 247, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .distillation-summary h2 {
      margin: 0 0 0.75rem 0;
      font-size: 1.1rem;
      color: var(--accent);
      display: flex;
      align-items: center;
    }
    .distillation-summary .summary-text {
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .task-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .task-card:last-child {
      margin-bottom: 0;
    }
    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.4rem;
    }
    .task-title {
      font-weight: bold;
      color: var(--fg);
    }
    .urgency-pill {
      font-size: 0.7rem;
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
      text-transform: uppercase;
      font-weight: bold;
    }
    .urgency-high { background: var(--error); color: var(--bg); }
    .urgency-medium { background: #e0af68; color: var(--bg); }
    .urgency-low { background: var(--success); color: var(--bg); }
    .task-desc {
      font-size: 0.85rem;
      color: #9aa5ce;
    }
    .error-log {
      color: var(--error);
      background: rgba(247, 118, 142, 0.1);
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      display: none;
      word-wrap: break-word;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      color: #9aa5ce;
    }
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-connected { background: var(--success); }
    .status-error { background: var(--error); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Greenkeeper Dashboard</h1>
    
    <div id="errorLog" class="error-log"></div>

    <div id="setupPanel" class="setup-panel">
      <div class="form-group">
        <label for="relayUrl">Cloudflare Relay URL (with ?key=...)</label>
        <input type="text" id="relayUrl" placeholder="https://...workers.dev?key=..." />
      </div>
      <div class="form-group">
        <label for="encryptionKey">AES-256-GCM Key (hex)</label>
        <input type="password" id="encryptionKey" placeholder="64-character hex key (from .env)" />
      </div>
      <button id="connectBtn">Decrypt & Read</button>
    </div>

    <div id="dashboardPanel" class="dashboard-panel" style="display: none;">
      <div class="status-bar">
        <div><span class="status-indicator status-connected"></span>Status: <span id="statusText">Connected</span></div>
      </div>
      <div id="messages"></div>
      <button id="refreshBtn" style="margin-top: 1rem; background: var(--panel); border: 1px solid var(--border); color: var(--fg);">Disconnect & Clear</button>
    </div>
  </div>

  <script>
    const TIMEOUT_MS = 10000; // 10 seconds

    function showError(msg) {
      const el = document.getElementById('errorLog');
      el.textContent = 'Error: ' + msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorLog').style.display = 'none';
    }

    async function decryptPayload(payload, keyHex) {
      try {
        const keyBuffer = new Uint8Array(keyHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
        const cryptoKey = await window.crypto.subtle.importKey(
          'raw',
          keyBuffer,
          { name: 'AES-GCM' },
          false,
          ['decrypt']
        );

        const ivBuffer = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
        const ciphertextBuffer = Uint8Array.from(atob(payload.ciphertext), c => c.charCodeAt(0));
        const authTagBuffer = Uint8Array.from(atob(payload.authTag), c => c.charCodeAt(0));

        const combinedBuffer = new Uint8Array(ciphertextBuffer.length + authTagBuffer.length);
        combinedBuffer.set(ciphertextBuffer);
        combinedBuffer.set(authTagBuffer, ciphertextBuffer.length);

        const decryptedBuffer = await window.crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: ivBuffer },
          cryptoKey,
          combinedBuffer
        );

        const decoder = new TextDecoder();
        return JSON.parse(decoder.decode(decryptedBuffer));
      } catch (e) {
        throw new Error('Decryption failed. Check key or payload format.');
      }
    }

    function showSetup() {
      document.getElementById('setupPanel').style.display = 'block';
      document.getElementById('dashboardPanel').style.display = 'none';
      
      sessionStorage.removeItem('encryptionKey');
    }

    function showDashboard() {
      hideError();
      const url = document.getElementById('relayUrl').value.trim();
      const key = document.getElementById('encryptionKey').value.trim();
      
      if (!url || !key) {
        showError('Please provide both URL and Key');
        return;
      }

      
      sessionStorage.setItem('encryptionKey', key);
      
      document.getElementById('setupPanel').style.display = 'none';
      document.getElementById('dashboardPanel').style.display = 'block';
      
      fetchMessages();
    }

    async function fetchMessages() {
      const relayUrl = document.getElementById('relayUrl').value.trim();
      const key = sessionStorage.getItem('encryptionKey');
      
      if (!relayUrl || !key) {
        showSetup();
        return;
      }

      const messagesEl = document.getElementById('messages');
      messagesEl.textContent = '';
      const loadingEl = document.createElement('div');
      loadingEl.style.color = '#666';
      loadingEl.textContent = 'Loading and decrypting...';
      messagesEl.appendChild(loadingEl);

      try {
        const response = await fetch(relayUrl, { 
          signal: AbortSignal.timeout(TIMEOUT_MS) 
        });
        
        if (!response.ok) { 
          if (response.status === 404) {
             throw new Error('Payload not found. It may have already been read and deleted.');
          }
          throw new Error(`Failed to fetch: ${response.statusText}`); 
        }
        
        const encryptedBlob = await response.json();
        
        messagesEl.textContent = ''; // clear loading

        try {
          const decrypted = await decryptPayload(encryptedBlob, key);
          const inner = JSON.parse(decrypted.content);
          const messages = inner.messages || [];
          const distillation = inner.distillation;

          // Render Distillation block if it exists
          if (distillation) {
            const distEl = document.createElement('div');
            distEl.className = 'distillation-summary';
            
            const distTitle = document.createElement('h2');
            distTitle.textContent = 'Distilled Summary';
            distEl.appendChild(distTitle);

            if (distillation.summary) {
              const summaryText = document.createElement('div');
              summaryText.className = 'summary-text';
              summaryText.textContent = distillation.summary;
              distEl.appendChild(summaryText);
            }

            if (distillation.tasks && distillation.tasks.length > 0) {
              for (const task of distillation.tasks) {
                const taskCard = document.createElement('div');
                taskCard.className = 'task-card';

                const taskHeader = document.createElement('div');
                taskHeader.className = 'task-header';

                const taskTitle = document.createElement('span');
                taskTitle.className = 'task-title';
                taskTitle.textContent = task.title || 'Untitled Task';
                taskHeader.appendChild(taskTitle);

                if (task.urgency) {
                  const urgencyPill = document.createElement('span');
                  urgencyPill.className = 'urgency-pill urgency-' + task.urgency.toLowerCase();
                  urgencyPill.textContent = task.urgency;
                  taskHeader.appendChild(urgencyPill);
                }
                taskCard.appendChild(taskHeader);

                if (task.description) {
                  const taskDesc = document.createElement('div');
                  taskDesc.className = 'task-desc';
                  taskDesc.textContent = task.description;
                  taskCard.appendChild(taskDesc);
                }

                distEl.appendChild(taskCard);
              }
            }
            messagesEl.appendChild(distEl);
          }
          
          // Status line
          const statusEl = document.createElement('div');
          statusEl.style.cssText = 'color: var(--success); margin-bottom: 1rem; font-size: 0.9rem;';
          statusEl.textContent = messages.length + ' message' + (messages.length !== 1 ? 's' : '') + ' decrypted';
          messagesEl.appendChild(statusEl);
          
          if (messages.length === 0) {
            const emptyEl = document.createElement('div');
            emptyEl.style.color = '#666';
            emptyEl.textContent = 'No messages in this payload.';
            messagesEl.appendChild(emptyEl);
          }
          
          for (const msg of messages) {
            const cardEl = document.createElement('div');
            cardEl.className = 'message';
            
            // Header row: sender + timestamp
            const headerEl = document.createElement('div');
            headerEl.style.cssText = 'display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;';
            
            const senderEl = document.createElement('strong');
            senderEl.style.color = 'var(--accent)';
            let senderText = msg.sender || 'Unknown';
            if (senderText.length > 100) senderText = senderText.slice(0, 100) + '...';
            senderEl.textContent = senderText;
            headerEl.appendChild(senderEl);
            
            if (msg.received_at) {
              const timeEl = document.createElement('span');
              timeEl.className = 'timestamp';
              timeEl.textContent = new Date(msg.received_at).toLocaleString();
              headerEl.appendChild(timeEl);
            }
            
            cardEl.appendChild(headerEl);
            
            // Preview text
            const previewEl = document.createElement('div');
            previewEl.className = 'decrypted';
            let preview = msg.preview || '';
            if (preview.length > 2000) preview = preview.slice(0, 2000) + '...';
            previewEl.textContent = preview;
            cardEl.appendChild(previewEl);
            
            messagesEl.appendChild(cardEl);
          }

        } catch (e) {
          console.error('Decryption failed:', e);
          const errorEl = document.createElement('div');
          errorEl.style.color = 'var(--error)';
          errorEl.textContent = 'Decryption failed. Invalid key or payload.';
          messagesEl.appendChild(errorEl);
        }

      } catch (err) {
        showError(err.message);
        messagesEl.textContent = '';
      }
    }

    document.getElementById('connectBtn').addEventListener('click', showDashboard);
    document.getElementById('refreshBtn').addEventListener('click', showSetup);

    if (sessionStorage.getItem('encryptionKey')) {
      
      document.getElementById('encryptionKey').value = sessionStorage.getItem('encryptionKey');
      showDashboard();
    }
  </script>
</body>
</html>
